<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProCalc | Modern Calculator</title>
    <link rel="stylesheet" href="prj3style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="calculator-container">
        <div class="calculator-display">
            <div data-previous-operand class="previous-operand"></div>
            <div data-current-operand class="current-operand">0</div>
        </div>

        <div class="calculator-grid">
            <button data-all-clear class="span-two control-btn">AC</button>
            <button data-delete class="control-btn">DEL</button>
            <button data-operation class="oper-btn">÷</button>
            
            <button data-number>1</button>
            <button data-number>2</button>
            <button data-number>3</button>
            <button data-operation class="oper-btn">*</button>
            
            <button data-number>4</button>
            <button data-number>5</button>
            <button data-number>6</button>
            <button data-operation class="oper-btn">+</button>
            
            <button data-number>7</button>
            <button data-number>8</button>
            <button data-number>9</button>
            <button data-operation class="oper-btn">-</button>
            
            <button data-number>.</button>
            <button data-number>0</button>
            <button data-equals class="span-two equals-btn">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
