<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Planner</title>
    <link rel="stylesheet" href="prj2style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="todo-app">
            <div class="app-header">
                <h2>Daily Plan <i class="fa-solid fa-pencil"></i></h2>
                <div id="date-display" class="date-text"></div>
            </div>
            
            <div class="row">
                <input type="text" id="input-box" placeholder="Write a new task...">
                <button onclick="addTask()">Save</button>
            </div>
            <div id="error-message" class="error"></div>

            <ul id="list-container"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
